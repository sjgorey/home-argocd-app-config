# 04-configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: neo4j-config
  namespace: neo4j
data:
  NEO4J_PLUGINS: '[]'
  NEO4J_server_memory_heap_initial__size: "512m"
  NEO4J_server_memory_heap_max__size: "1024m"
  NEO4J_server_memory_pagecache_size: "512m"
  NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
