apiVersion: v1
kind: Secret
metadata:
  name: paperless-ai-secrets
  namespace: paperless-ngx
type: Opaque
stringData:
  # The token you generated in the Paperless-ngx UI
  PAPERLESS_API_TOKEN: "token"
  # Only needed if you use OpenAI/Anthropic instead of local Ollama
  OPENAI_API_KEY: "optional_key"