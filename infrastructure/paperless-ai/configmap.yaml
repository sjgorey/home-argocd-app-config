apiVersion: v1
kind: ConfigMap
metadata:
  name: paperless-ai-config
  namespace: paperless-ngx
data:
  # Node.js Service Variables
  PAPERLESS_API_URL: "http://paperless-ngx"
  PAPERLESS_USERNAME: "admin"
  
  # Python (RAGZ) Service Aliases
  PAPERLESS_URL: "http://paperless-ngx"
  OLLAMA_MODEL_NAME: "llama3.2:3b"
  
  # General Settings
  AI_PROVIDER: "ollama"
  OLLAMA_URL: "http://192.168.1.10:11434"
  AI_MODEL: "llama3.2:3b"
  SCAN_INTERVAL: "30"

  PAPERLESS_AI_PORT: "3001" 
  INSTANCES: "1"
  PM2_INSTANCES: "1"
  HOST: "0.0.0.0"
