apiVersion: v1
kind: ConfigMap
metadata:
  name: paperless-ai-config
  namespace: paperless-ngx
data:
  # Application config is managed by the paperless-ai setup UI at /setup,
  # which writes to /app/data/.env on the PVC. Do not add vars here that
  # the app also reads from .env — process.env takes precedence over dotenv
  # and will silently override the setup-wizard values.
  PAPERLESS_AI_PORT: "3001"
