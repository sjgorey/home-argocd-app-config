apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: paperless-ngx-network-policy
  namespace: paperless-ngx
spec:
  podSelector:
    matchLabels:
      app: paperless-ngx
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # 1. Allow internal cluster traffic (Ingress/Traefik)
  - ports:
    - protocol: TCP
      port: 8000
  # 2. NEW: Allow Paperless-AI to talk to Paperless-ngx
  - from:
    - podSelector:
        matchLabels:
          app: paperless-ai
    ports:
    - protocol: TCP
      port: 8000
  # 3. Allow app to talk to its own DB/Redis/Tika/Gotenberg
  - from:
    - podSelector:
        matchLabels:
          app: paperless-ngx
          component: app
    ports:
    - protocol: TCP
      port: 5432
    - protocol: TCP
      port: 6379
    - protocol: TCP
      port: 9998
    - protocol: TCP
      port: 3000
  egress:
  - {} # Allows all outgoing traffic (needed for Ollama/External APIs)